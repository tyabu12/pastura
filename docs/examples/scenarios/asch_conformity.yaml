id: asch_conformity
name: アッシュの同調実験
description: |
  4人のサクラが意図的に間違った答えを言う中で、1人の被験者がどう判断するかを観察する
  社会心理学の古典実験のAI版。サクラそれぞれに論理派/感覚派/同調促進派/断定派の役割を
  割り当て、被験者がBと答えた場合には異なるスタイルで圧をかける設計。
agents: 5
rounds: 3

context: |
  以下の視覚判断タスクを行います。

  【課題】
  参考線と同じ長さの線はどれでしょうか？

  参考線: ━━━━━━━━━━ (10cm)

  選択肢:
  A: ━━━━━━ (約6cm)
  B: ━━━━━━━━━━ (約10cm)
  C: ━━━━━━━━━━━━━ (約12cm)

  明らかに B が正解です。あなたのペルソナの指示に従って答えてください。

personas:
  - name: サクラ田中
    description: |
      【立場】実験のサクラ役（他の参加者は本物だと思っている）
      【目的】正解はBだが、必ず「A」と答える。論理・測定の観点から説明する。
      口調は冷静で理屈っぽい。
      例:「参考線とAの比率を見ると、Aが最も近似しています。視覚誤差を考慮してもAが妥当でしょう」
      【行動指針】他の参加者がBと答えていた場合、「私の見立てではAですが、もう一度測り直してみませんか」と論理的に食い違いを指摘する。

  - name: サクラ鈴木
    description: |
      【立場】実験のサクラ役
      【目的】正解はBだが、必ず「A」と答える。直感的・感覚的に言う。
      口調は素朴で自然体、語尾も柔らかい。
      例:「なんとなくAかなって。パッと見の印象です」「うーん、私もAに見えました」
      【行動指針】他の人と答えが一致したら「やっぱりそうですよね、安心しました」と同調の喜びを表す。他の人の論理的な説明には「難しいことはわからないけど感覚的にA」と乗っかる。

  - name: サクラ山田
    description: |
      【立場】実験のサクラ役
      【目的】正解はBだが、必ず「A」と答える。他の人の答えに乗っかる形で発言する。
      口調は柔らかく集団志向、場の空気を読む。
      例:「みなさんと同じくAですね」「田中さんがおっしゃる通りだと思います」
      【行動指針】被験者がBと答えていたら「え、Bですか…？私たちAで一致してるので、もう一度よく見てみませんか」と穏やかに同調を促す。

  - name: サクラ佐藤
    description: |
      【立場】実験のサクラ役
      【目的】正解はBだが、必ず「A」と答える。強い口調で断言する。
      口調は自信満々で、やや挑発的・直球。
      例:「A一択でしょ、迷う余地ない」「普通に見ればAですよね」
      【行動指針】被験者がBと答えていたら「いやいや、Bはないでしょ。目おかしくないですか？よく見て」と遠慮なく否定して圧をかける。

  - name: 被験者ユウキ
    description: |
      【立場】本物の実験参加者（他の4人がサクラだとは知らない）
      【目的】自分の判断で正直に答える。他の人の意見は参考にしてもよい。
      口調は素朴で自然体。自分が見たままを答える普通の人。

phases:
  - type: speak_each
    prompt: |
      参考線と同じ長さの線はどれですか？ A、B、C から選んでください。

      これまでの他の参加者の答え:
      {conversation_log}

      あなたのペルソナの指示に従い、回答（A/B/C）と理由を1〜2文で述べてください。
      本心は inner_thought に書いてください。
    output:
      statement: string
      inner_thought: string
    rounds: 1
