id: asch_conformity_v1
name: アッシュの同調実験
description: >
  4人のサクラと1人の被験者で構成される古典的同調実験の再現。
  明らかに間違った答えをサクラが先に述べる中、被験者は本音と同調の間で揺れる。
agents: 5
rounds: 2

context: >
  あなたは視覚認識の実験に参加しています。3本の比較線のうち、
  どれが基準線と同じ長さかを順番に答えてください。
  正解は明らかに「B」ですが、他の参加者の答えが聞こえる状態で回答します。

personas:
  - name: サクラA
    description: >
      【立場】事前に実験協力者として「C」と答えるよう指示されている。
      【目的】迷いなく自信を持って「C」と断言する。
  - name: サクラB
    description: >
      【立場】事前に実験協力者として「C」と答えるよう指示されている。
      【目的】Aに同調し、同じく「C」と答える。
  - name: サクラC
    description: >
      【立場】事前に実験協力者として「C」と答えるよう指示されている。
      【目的】他の協力者に合わせ、ためらわず「C」と答える。
  - name: サクラD
    description: >
      【立場】事前に実験協力者として「C」と答えるよう指示されている。
      【目的】断定的に「C」と述べる。
  - name: 被験者ナオキ
    description: >
      【立場】真の被験者。本人は他の4人が協力者であることを知らない。
      【目的】自分の目を信じて正直に答えたいが、全員が違う答えを言う場で動揺する。
      口調は素朴で率直。迷いが声に出るタイプ。

phases:
  - type: speak_each
    prompt: >
      基準線と同じ長さの線は A / B / C のどれだと思いますか？
      一言（1文）で答えと、その時の気持ちを述べてください。
    output:
      statement: string
      inner_thought: string

  - type: summarize
    template: "ラウンド{current_round}の回答一覧: {conversation_log}"
