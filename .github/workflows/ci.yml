name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
      test-failed: ${{ steps.test.outputs.failed }}
      test-parse-error: ${{ steps.test.outputs.parse_error }}
      coverage-pct: ${{ steps.coverage.outputs.pct }}
      lint-result: ${{ steps.lint.outputs.result }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode and Simulator
        run: |
          ls /Applications/Xcode*.app
          xcodebuild -version
          # List available iPhone simulators for diagnostics
          xcrun simctl list devices available iPhone | head -20
          # Resolve simulator destination via shared script
          source scripts/sim-dest.sh
          echo "DEST=$DEST" >> "$GITHUB_ENV"

      # NOTE: CI intentionally uses the default ~/Library DerivedData path so
      # this cache key keeps hitting. Local dev builds go to
      # Pastura/DerivedData/ via -derivedDataPath — see CLAUDE.md
      # "DerivedData location". If CI ever adopts -derivedDataPath, update
      # this cache path to match (and both instances of it in this file).
      - name: Cache SPM packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: SwiftLint
        id: lint
        run: |
          brew install swiftlint
          if swiftlint lint --strict --reporter github-actions-logging; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Test with Coverage
        id: test
        run: |
          # Stream xcodebuild output to the job log via tee so per-test lines
          # are visible live (command substitution would buffer until exit,
          # losing all output on timeout-kill). Trailing `|| true` prevents
          # `set -eo pipefail` (GHA default) from aborting the script before
          # PIPESTATUS is captured.
          #
          # `-parallel-testing-enabled NO` — workaround for CI OOM cascade
          # first observed on `main` post-#186 (sha e650f13). Multiple
          # simulator clones on the macos-26 runner (~7 GB RAM) pushed the
          # test host over the OOM threshold; symptoms were trivial unit
          # tests taking ~3.1 s each (vs <10 ms locally) followed by a
          # host kill that marked 262–736 queued tests as "signal trap".
          # With this flag, `lint-and-test` completes in ~8 min — well
          # within the 10-min budget (CLAUDE.md). Root-cause investigation
          # is tracked in #189; when that lands, revisit whether to restore
          # full parallelism or settle on a targeted
          # `-parallel-testing-worker-count N`.
          xcodebuild test \
            -scheme Pastura \
            -project Pastura/Pastura.xcodeproj \
            -destination "$DEST" \
            -only-testing PasturaTests \
            -parallel-testing-enabled NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xctest-unit.log || true
          TEST_EXIT=${PIPESTATUS[0]}

          # xcodebuild outputs per-case lines:
          #   Test case '...' passed on '...' (X.XXX seconds)
          #   Test case '...' failed on '...' (X.XXX seconds)
          # `|| true` swallows grep's exit-1 on zero matches and exit-2 on
          # missing file (timeout-kill case). Do NOT use `|| echo 0` here —
          # grep -c already prints "0" on zero matches, so appending another
          # "0" via echo yields a two-line "0\n0" value that corrupts
          # `$GITHUB_OUTPUT` and breaks the numeric comparison below. The
          # `:-0` default covers the missing-file case where grep produced no
          # stdout at all.
          PASSED=$(grep -c "^Test case .* passed " /tmp/xctest-unit.log 2>/dev/null || true)
          FAILED=$(grep -c "^Test case .* failed " /tmp/xctest-unit.log 2>/dev/null || true)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          if [ "$PASSED" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          fi

          exit ${TEST_EXIT:-0}

      - name: Coverage Report
        id: coverage
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcrun xccov view --report TestResults.xcresult
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            PCT=$(python3 -c "import sys,json; print(round(json.load(sys.stdin)['lineCoverage']*10000)/100)" < coverage.json)
            PCT=${PCT:-0.00}
            if ! [[ "$PCT" =~ ^[0-9]+\.[0-9]+$ ]]; then
              PCT=0.00
            fi
            echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          else
            echo "pct=0.00" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            TestResults.xcresult
            coverage.json
          retention-days: 7

  ui-test:
    runs-on: macos-26
    # UI tests are 5-6x slower on CI simulators (no GPU acceleration). Locally
    # the suite runs in ~2 min; on CI it takes ~12 min. The 25 min budget
    # leaves headroom for build + simulator boot and future test additions.
    timeout-minutes: 25
    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
      test-failed: ${{ steps.test.outputs.failed }}
      test-parse-error: ${{ steps.test.outputs.parse_error }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode and Simulator
        run: |
          xcodebuild -version
          source scripts/sim-dest.sh
          echo "DEST=$DEST" >> "$GITHUB_ENV"
          # Extract UDID for the pre-boot step. DEST format:
          # "platform=iOS Simulator,id=<UDID>"
          SIM_UDID=$(echo "$DEST" | sed -n 's/.*id=\([^,]*\).*/\1/p')
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Pre-boot Simulator
        # UI tests on GitHub Actions macOS runners frequently fail with
        # "Simulator device failed to launch ... xctrunner (RequestDenied)"
        # when xcodebuild test tries to boot, install, and launch the
        # runner all at once on a fresh VM. Booting explicitly first and
        # waiting for the system to be fully up ("-b") avoids the race.
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl boot "$SIM_UDID" || true
          xcrun simctl bootstatus "$SIM_UDID" -b

      # NOTE: CI intentionally uses the default ~/Library DerivedData path so
      # this cache key keeps hitting. Local dev builds go to
      # Pastura/DerivedData/ via -derivedDataPath — see CLAUDE.md
      # "DerivedData location". If CI ever adopts -derivedDataPath, update
      # this cache path to match (and both instances of it in this file).
      - name: Cache SPM packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Test PasturaUITests
        id: test
        run: |
          # Coverage intentionally omitted — UI tests inflate line coverage
          # without adding meaningful unit-level signal, and disabling it
          # shaves a non-trivial amount off the run.
          # -retry-tests-on-failure auto-reruns failing tests up to
          # -test-iterations N total times. Combined with the per-test
          # tearDown that terminates the app, this absorbs intermittent
          # CI-only infrastructure errors like "Failed to get background
          # assertion" without masking real test failures (those fail on
          # every retry).
          # See unit-test step for rationale on tee / PIPESTATUS / || true.
          xcodebuild test \
            -scheme Pastura \
            -project Pastura/Pastura.xcodeproj \
            -destination "$DEST" \
            -only-testing PasturaUITests \
            -retry-tests-on-failure \
            -test-iterations 2 \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xctest-ui.log || true
          TEST_EXIT=${PIPESTATUS[0]}

          PASSED=$(grep -c "^Test case .* passed " /tmp/xctest-ui.log 2>/dev/null || true)
          FAILED=$(grep -c "^Test case .* failed " /tmp/xctest-ui.log 2>/dev/null || true)
          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          if [ "$PASSED" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          fi

          exit ${TEST_EXIT:-0}

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 7

  # Enforces ADR-005 §8.5 on every PR: `OllamaService` must not link into the
  # Release-iphoneos binary (App-Store-submission target). Runs in parallel
  # with lint-and-test and ui-test. See ADR-005 §8 and docs/decisions/ADR-005.md.
  release-build:
    name: Release build (iphoneos) + ADR-005 §8 guard
    runs-on: macos-26
    timeout-minutes: 15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode
        run: xcodebuild -version

      # Same key/path as lint-and-test / ui-test — shared warm SPM cache.
      # See the lint-and-test Cache step for the rationale on CI staying on
      # the default ~/Library DerivedData path.
      - name: Cache SPM packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      # Deliberately NO `|| true` / PIPESTATUS dance here, unlike the
      # unit/UI test steps above. Those steps must continue past xcodebuild
      # failure to parse log output for the sticky PR comment; this step
      # only needs the binary for the symbol grep. With GHA's default
      # `bash -eo pipefail`, a non-zero xcodebuild exit short-circuits the
      # `tee` pipeline naturally — that is the intended behaviour here.
      # -sdk iphoneos (not iphonesimulator) because Release-simulator still
      # defines targetEnvironment(simulator), which would pull OllamaService
      # back in and make the guard fire vacuously.
      - name: Release build
        run: |
          xcodebuild build \
            -scheme Pastura \
            -project Pastura/Pastura.xcodeproj \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/release-build.log

      - name: Verify ADR-005 §8 — OllamaService excluded
        run: |
          # Locate the Release-iphoneos binary. xcodebuild uses the default
          # ~/Library/... DerivedData on CI (see Cache step). Multiple matches
          # would indicate a cache-layout bug — fail loudly rather than pick one.
          # Portable while/read loop because `mapfile` is bash 4+ and GHA
          # macOS runners default to /bin/bash 3.2 (Apple GPLv3 avoidance).
          BINS=()
          while IFS= read -r -d '' f; do
            BINS+=("$f")
          done < <(find ~/Library/Developer/Xcode/DerivedData \
            -type f \
            -path '*/Build/Products/Release-iphoneos/Pastura.app/Pastura' \
            -print0)
          if [ "${#BINS[@]}" -ne 1 ]; then
            echo "::error::Expected exactly 1 Release binary, found ${#BINS[@]}"
            printf '%s\n' "${BINS[@]}"
            exit 1
          fi
          BIN="${BINS[0]}"
          echo "Checking $BIN"
          # Demangle before grep: failure output stays human-readable and the
          # check catches future helpers like OllamaClient / ollamaBridge that
          # a narrower match would miss. Matches ADR-005 §8.5.
          MATCHES=$(nm -a "$BIN" | xcrun swift-demangle | grep -i ollama || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::ollama symbols leaked into Release binary (ADR-005 §8)"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK: zero ollama symbols in Release-iphoneos binary"

      - name: Upload Release build log (on failure)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-build-log
          path: /tmp/release-build.log
          retention-days: 7

  coverage:
    name: Coverage
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # SECURITY: This condition prevents fork PRs from accessing GIST_SECRET.
    # Do not remove or weaken without reviewing secret exposure implications.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # GIST_SECRET must be a PAT with only the "gist" scope (classic)
      # or "gists: write" (fine-grained). No other permissions needed.
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 2e86dcd3eddf5d5294d75870c9ad62e7
          filename: pastura-coverage.json
          label: coverage
          message: ${{ needs.lint-and-test.outputs.coverage-pct }}%
          valColorRange: ${{ needs.lint-and-test.outputs.coverage-pct }}
          minColorRange: 0
          maxColorRange: 100

  # SECURITY: Do NOT add actions/checkout or run untrusted code in this job.
  # This job has pull-requests: write and must never execute PR code.
  # Do NOT change the trigger to pull_request_target.
  pr-comment:
    name: PR Comment
    needs: [lint-and-test, ui-test, release-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate comment body
        env:
          UNIT_JOB_RESULT: ${{ needs.lint-and-test.result }}
          UI_JOB_RESULT: ${{ needs.ui-test.result }}
          RELEASE_JOB_RESULT: ${{ needs.release-build.result }}
          TEST_PASSED: ${{ needs.lint-and-test.outputs.test-passed }}
          TEST_FAILED: ${{ needs.lint-and-test.outputs.test-failed }}
          TEST_PARSE_ERROR: ${{ needs.lint-and-test.outputs.test-parse-error }}
          UI_TEST_PASSED: ${{ needs.ui-test.outputs.test-passed }}
          UI_TEST_FAILED: ${{ needs.ui-test.outputs.test-failed }}
          UI_TEST_PARSE_ERROR: ${{ needs.ui-test.outputs.test-parse-error }}
          COVERAGE_PCT: ${{ needs.lint-and-test.outputs.coverage-pct }}
          LINT_RESULT: ${{ needs.lint-and-test.outputs.lint-result }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## CI Report"
            echo ""

            # Job-level failure banner
            for job_result in "$UNIT_JOB_RESULT" "$UI_JOB_RESULT" "$RELEASE_JOB_RESULT"; do
              if [ "$job_result" = "skipped" ] || [ "$job_result" = "cancelled" ]; then
                echo "> One or more CI jobs were ${job_result}."
                echo ""
                break
              fi
            done
            if [ "$UNIT_JOB_RESULT" = "failure" ] \
                || [ "$UI_JOB_RESULT" = "failure" ] \
                || [ "$RELEASE_JOB_RESULT" = "failure" ]; then
              echo "> **CI job failed.** See [CI logs](${CI_RUN_URL}) for details."
              echo ""
            fi

            # Lint results
            echo "### Lint"
            echo ""
            if [ "$LINT_RESULT" = "pass" ]; then
              echo "SwiftLint: **passed**"
            elif [ "$LINT_RESULT" = "fail" ]; then
              echo "SwiftLint: **FAILED**"
            else
              echo "SwiftLint: did not run"
            fi

            # Release build (ADR-005 §8 submission-blocker gate — surfaced
            # here so a silent regression is visible on the PR, not only in
            # the Actions tab)
            echo ""
            echo "### Release Build (ADR-005 §8 guard)"
            echo ""
            if [ "$RELEASE_JOB_RESULT" = "success" ]; then
              echo "Release-iphoneos symbol guard: **passed**"
            elif [ "$RELEASE_JOB_RESULT" = "failure" ]; then
              echo "Release-iphoneos symbol guard: **FAILED** — see [CI logs](${CI_RUN_URL})"
            else
              echo "Release-iphoneos symbol guard: did not run"
            fi

            # Test results — unit + UI shown separately so a slow UI suite
            # never blocks fast unit-test feedback signalling
            echo ""
            echo "### Test Results"
            echo ""
            if [ "$TEST_PARSE_ERROR" = "true" ]; then
              echo "- Unit: > Could not parse test output."
            elif [ -n "$TEST_PASSED" ]; then
              PASSED=$(echo "${TEST_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              FAILED=$(echo "${TEST_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              if [ "$FAILED" = "0" ]; then
                echo "- Unit: **${PASSED} passed**"
              else
                echo "- Unit: **${PASSED} passed, ${FAILED} FAILED**"
              fi
            else
              echo "- Unit: > did not run"
            fi

            if [ "$UI_TEST_PARSE_ERROR" = "true" ]; then
              echo "- UI: > Could not parse test output."
            elif [ -n "$UI_TEST_PASSED" ]; then
              UI_PASSED=$(echo "${UI_TEST_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              UI_FAILED=$(echo "${UI_TEST_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              if [ "$UI_FAILED" = "0" ]; then
                echo "- UI: **${UI_PASSED} passed**"
              else
                echo "- UI: **${UI_PASSED} passed, ${UI_FAILED} FAILED**"
              fi
            else
              echo "- UI: > did not run"
            fi

            # Coverage
            echo ""
            echo "### Coverage"
            echo ""
            if [ "$COVERAGE_PCT" = "0.00" ] || [ -z "$COVERAGE_PCT" ]; then
              echo "> Coverage measurement failed. See [CI logs](${CI_RUN_URL}) for details."
            else
              echo "**${COVERAGE_PCT}%** line coverage"
            fi

            echo ""
            echo "---"
            echo "[View full CI run](${CI_RUN_URL})"
          } > /tmp/pr-comment.md

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        # Fork PRs have read-only GITHUB_TOKEN; comment posting will fail gracefully.
        continue-on-error: true
        with:
          header: ci-report
          path: /tmp/pr-comment.md
