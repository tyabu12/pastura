# .swiftlint.yml
included:
  - Pastura

excluded:
  - Pastura/Resources
  # Workspace-relative DerivedData lands here; don't lint SPM checkouts
  # + Xcode-generated build artifacts.
  - Pastura/DerivedData

disabled_rules:
  - line_length          # YAML-heavy string literals exceed 120 chars
  - todo                 # Allow TODO/FIXME during MVP development
  - force_cast           # Needed for Yams [String: Any] manual mapping

identifier_name:
  excluded:
    - db  # GRDB convention for database connection parameter
    - t   # GRDB convention for table definition builder
    - i   # Standard loop variable
    - id  # Common identifier property

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - fatal_error_message
  - first_where
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - unused_import

custom_rules:
  # i18n leak tripwire (#292) — fires on the empirical 10 property names
  # surfaced by the PR #288 audit + LocalizedError cleanup in PR #299. This
  # is a TRIPWIRE for the common `errorMessage = "..."` leak shape, NOT a
  # coverage check; broad coverage is Tier 2's job (see
  # `scripts/check_i18n_potential_keys.py`). The narrow property-name list is
  # what keeps the false-positive rate at zero — widening to all `String`
  # assignments would re-introduce noise that drowned out the empirical
  # signal in PR #288's analysis. To extend when a new ViewModel lands a
  # user-facing `String?` property: append the property name to the regex
  # alternation. See `docs/i18n/leak-detection.md` for the full architecture.
  unwrapped_user_facing_string:
    name: "Unwrapped user-facing String"
    regex: '(errorMessage|validationErrors|alertMessage|toastMessage|nameError|descriptionError|conditionError|promptError|outcomeAlert|deepLinkError)\s*[+=]+\s*\[?\s*"[^"]+"'
    included:
      - 'Pastura/Pastura/.*\.swift'
    severity: warning
    message: "User-facing String must be wrapped with String(localized: \"...\") so it lands in Localizable.xcstrings and gets a `ja` translation. See CLAUDE.md § 'User-facing String literals' and docs/i18n/leak-detection.md."

  # ADR-002 §12 — `tryClaimGeneratingGuard` / `forceClaimGeneratingGuard` are
  # internal-access only because the cross-file `+Lifecycle.swift` extension
  # cannot reach the `private` `generatingGuard`. They are NOT a public
  # contract: the only legitimate caller is `acquireGenerateGuard` in
  # `+Lifecycle.swift`. A future caller that touches these directly would
  # resurrect the multi-waiter race that Issue #221 fixed (separate wait +
  # claim != atomic wait-and-claim). This rule blocks accidental re-introduction.
  generating_guard_helpers_scope:
    name: "generating_guard_helpers_scope"
    regex: '\b(tryClaimGeneratingGuard|forceClaimGeneratingGuard)\b'
    match_kinds:
      - identifier
    included:
      - 'Pastura/Pastura/.*\.swift'
    excluded:
      - 'Pastura/Pastura/LLM/LlamaCppService\.swift'
      - 'Pastura/Pastura/LLM/LlamaCppService\+Lifecycle\.swift'
    severity: error
    message: "tryClaim/forceClaimGeneratingGuard are the private contract for acquireGenerateGuard (LlamaCppService+Lifecycle.swift). Use acquireGenerateGuard(caller:) instead — see ADR-002 §12."
