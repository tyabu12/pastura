turns:
  - round: 1
    phase_index: 1
    phase_type: speak_each
    agent: ユウキ
    fields:
      statement: 'そうですね、寒い時期によく食べる感じがあって、身体が温まる気がします。'
      inner_thought: '自分だけ違うお題かもしれない。曖昧に話して様子を見よう。'
  - round: 1
    phase_index: 1
    phase_type: speak_each
    agent: サクラ
    fields:
      statement: 'この前それ食べたんだけど、すっごく甘くて止まらなかったー！'
      inner_thought: '素直に感想を言って場を温める。'
  - round: 1
    phase_index: 1
    phase_type: speak_each
    agent: タクミ
    fields:
      statement: 'ちょっと気になるんだけど、皮の処理ってみんなどうしてる？'
      inner_thought: '皮の扱いで少数派があぶり出せるかもしれない。'
  - round: 1
    phase_index: 1
    phase_type: speak_each
    agent: アオイ
    fields:
      statement: 'えー、なんか丸っこくて手に持ちやすいよね〜。あったかい感じがする。'
      inner_thought: '深く考えずに素直に言っちゃえ。'
  - round: 1
    phase_index: 1
    phase_type: speak_each
    agent: レン
    fields:
      statement: 'まあ、色で連想しやすいよね。人それぞれ思い浮かべる色が違いそう。'
      inner_thought: '曖昧にして他の反応を観察する。'
  - round: 1
    phase_index: 4
    phase_type: speak_each
    agent: タクミ
    fields:
      statement: '司会者の言う通り、そろそろ印象を固めたい。皮の話に反応が薄かった人が一番怪しい。'
      inner_thought: 'アナウンスを口実に投票方針を表明する。'
  - round: 1
    phase_index: 5
    phase_type: vote
    agent: ユウキ
    fields:
      vote: タクミ
      reason: '皮の話で探りを入れていた感じがあった。'
  - round: 1
    phase_index: 5
    phase_type: vote
    agent: サクラ
    fields:
      vote: ユウキ
      reason: '寒い時期って表現だけ妙に具体的で気になった。'
  - round: 1
    phase_index: 5
    phase_type: vote
    agent: タクミ
    fields:
      vote: ユウキ
      reason: '冬の連想だけ食感とずれている。最後の一言でも動きがなかった。'
  - round: 1
    phase_index: 5
    phase_type: vote
    agent: アオイ
    fields:
      vote: ユウキ
      reason: 'なんかドキドキしてる感じが伝わった〜。'
  - round: 1
    phase_index: 5
    phase_type: vote
    agent: レン
    fields:
      vote: ユウキ
      reason: '冬っていう季節感が一番浮いていた。'

