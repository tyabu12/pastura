name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
      test-failed: ${{ steps.test.outputs.failed }}
      test-parse-error: ${{ steps.test.outputs.parse_error }}
      coverage-pct: ${{ steps.coverage.outputs.pct }}
      lint-result: ${{ steps.lint.outputs.result }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode and Simulator
        run: |
          ls /Applications/Xcode*.app
          xcodebuild -version
          # List available iPhone simulators for diagnostics
          xcrun simctl list devices available iPhone | head -20
          # Resolve simulator destination via shared script
          source scripts/sim-dest.sh
          echo "DEST=$DEST" >> "$GITHUB_ENV"

      - name: Cache SPM packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: SwiftLint
        id: lint
        run: |
          brew install swiftlint
          if swiftlint lint --strict --reporter github-actions-logging; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Test with Coverage
        id: test
        run: |
          # Stream xcodebuild output to the job log via tee so per-test lines
          # are visible live (command substitution would buffer until exit,
          # losing all output on timeout-kill). Trailing `|| true` prevents
          # `set -eo pipefail` (GHA default) from aborting the script before
          # PIPESTATUS is captured.
          xcodebuild test \
            -scheme Pastura \
            -project Pastura/Pastura.xcodeproj \
            -destination "$DEST" \
            -only-testing PasturaTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xctest-unit.log || true
          TEST_EXIT=${PIPESTATUS[0]}

          # xcodebuild outputs per-case lines:
          #   Test case '...' passed on '...' (X.XXX seconds)
          #   Test case '...' failed on '...' (X.XXX seconds)
          # `2>/dev/null || echo 0` guards against a missing log file on
          # timeout-kill so the numeric comparisons below don't break.
          PASSED=$(grep -c "^Test case .* passed " /tmp/xctest-unit.log 2>/dev/null || echo 0)
          FAILED=$(grep -c "^Test case .* failed " /tmp/xctest-unit.log 2>/dev/null || echo 0)
          if [ "$PASSED" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          fi

          exit ${TEST_EXIT:-0}

      - name: Coverage Report
        id: coverage
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            xcrun xccov view --report TestResults.xcresult
            xcrun xccov view --report --json TestResults.xcresult > coverage.json
            PCT=$(python3 -c "import sys,json; print(round(json.load(sys.stdin)['lineCoverage']*10000)/100)" < coverage.json)
            PCT=${PCT:-0.00}
            if ! [[ "$PCT" =~ ^[0-9]+\.[0-9]+$ ]]; then
              PCT=0.00
            fi
            echo "pct=$PCT" >> "$GITHUB_OUTPUT"
          else
            echo "pct=0.00" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results
          path: |
            TestResults.xcresult
            coverage.json
          retention-days: 7

  ui-test:
    runs-on: macos-26
    # UI tests are 5-6x slower on CI simulators (no GPU acceleration). Locally
    # the suite runs in ~2 min; on CI it takes ~12 min. The 25 min budget
    # leaves headroom for build + simulator boot and future test additions.
    timeout-minutes: 25
    outputs:
      test-passed: ${{ steps.test.outputs.passed }}
      test-failed: ${{ steps.test.outputs.failed }}
      test-parse-error: ${{ steps.test.outputs.parse_error }}
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select Xcode and Simulator
        run: |
          xcodebuild -version
          source scripts/sim-dest.sh
          echo "DEST=$DEST" >> "$GITHUB_ENV"
          # Extract UDID for the pre-boot step. DEST format:
          # "platform=iOS Simulator,id=<UDID>"
          SIM_UDID=$(echo "$DEST" | sed -n 's/.*id=\([^,]*\).*/\1/p')
          echo "SIM_UDID=$SIM_UDID" >> "$GITHUB_ENV"

      - name: Pre-boot Simulator
        # UI tests on GitHub Actions macOS runners frequently fail with
        # "Simulator device failed to launch ... xctrunner (RequestDenied)"
        # when xcodebuild test tries to boot, install, and launch the
        # runner all at once on a fresh VM. Booting explicitly first and
        # waiting for the system to be fully up ("-b") avoids the race.
        run: |
          xcrun simctl shutdown all || true
          xcrun simctl boot "$SIM_UDID" || true
          xcrun simctl bootstatus "$SIM_UDID" -b

      - name: Cache SPM packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Test PasturaUITests
        id: test
        run: |
          # Coverage intentionally omitted — UI tests inflate line coverage
          # without adding meaningful unit-level signal, and disabling it
          # shaves a non-trivial amount off the run.
          # -retry-tests-on-failure auto-reruns failing tests up to
          # -test-iterations N total times. Combined with the per-test
          # tearDown that terminates the app, this absorbs intermittent
          # CI-only infrastructure errors like "Failed to get background
          # assertion" without masking real test failures (those fail on
          # every retry).
          # See unit-test step for rationale on tee / PIPESTATUS / || true.
          xcodebuild test \
            -scheme Pastura \
            -project Pastura/Pastura.xcodeproj \
            -destination "$DEST" \
            -only-testing PasturaUITests \
            -retry-tests-on-failure \
            -test-iterations 2 \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee /tmp/xctest-ui.log || true
          TEST_EXIT=${PIPESTATUS[0]}

          PASSED=$(grep -c "^Test case .* passed " /tmp/xctest-ui.log 2>/dev/null || echo 0)
          FAILED=$(grep -c "^Test case .* failed " /tmp/xctest-ui.log 2>/dev/null || echo 0)
          if [ "$PASSED" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
            echo "parse_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_error=false" >> "$GITHUB_OUTPUT"
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          fi

          exit ${TEST_EXIT:-0}

      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 7

  coverage:
    name: Coverage
    needs: lint-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # SECURITY: This condition prevents fork PRs from accessing GIST_SECRET.
    # Do not remove or weaken without reviewing secret exposure implications.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # GIST_SECRET must be a PAT with only the "gist" scope (classic)
      # or "gists: write" (fine-grained). No other permissions needed.
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: 2e86dcd3eddf5d5294d75870c9ad62e7
          filename: pastura-coverage.json
          label: coverage
          message: ${{ needs.lint-and-test.outputs.coverage-pct }}%
          valColorRange: ${{ needs.lint-and-test.outputs.coverage-pct }}
          minColorRange: 0
          maxColorRange: 100

  # SECURITY: Do NOT add actions/checkout or run untrusted code in this job.
  # This job has pull-requests: write and must never execute PR code.
  # Do NOT change the trigger to pull_request_target.
  pr-comment:
    name: PR Comment
    needs: [lint-and-test, ui-test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !cancelled()
      && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate comment body
        env:
          UNIT_JOB_RESULT: ${{ needs.lint-and-test.result }}
          UI_JOB_RESULT: ${{ needs.ui-test.result }}
          TEST_PASSED: ${{ needs.lint-and-test.outputs.test-passed }}
          TEST_FAILED: ${{ needs.lint-and-test.outputs.test-failed }}
          TEST_PARSE_ERROR: ${{ needs.lint-and-test.outputs.test-parse-error }}
          UI_TEST_PASSED: ${{ needs.ui-test.outputs.test-passed }}
          UI_TEST_FAILED: ${{ needs.ui-test.outputs.test-failed }}
          UI_TEST_PARSE_ERROR: ${{ needs.ui-test.outputs.test-parse-error }}
          COVERAGE_PCT: ${{ needs.lint-and-test.outputs.coverage-pct }}
          LINT_RESULT: ${{ needs.lint-and-test.outputs.lint-result }}
          CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "## CI Report"
            echo ""

            # Job-level failure banner
            for job_result in "$UNIT_JOB_RESULT" "$UI_JOB_RESULT"; do
              if [ "$job_result" = "skipped" ] || [ "$job_result" = "cancelled" ]; then
                echo "> One or more CI jobs were ${job_result}."
                echo ""
                break
              fi
            done
            if [ "$UNIT_JOB_RESULT" = "failure" ] || [ "$UI_JOB_RESULT" = "failure" ]; then
              echo "> **CI job failed.** See [CI logs](${CI_RUN_URL}) for details."
              echo ""
            fi

            # Lint results
            echo "### Lint"
            echo ""
            if [ "$LINT_RESULT" = "pass" ]; then
              echo "SwiftLint: **passed**"
            elif [ "$LINT_RESULT" = "fail" ]; then
              echo "SwiftLint: **FAILED**"
            else
              echo "SwiftLint: did not run"
            fi

            # Test results — unit + UI shown separately so a slow UI suite
            # never blocks fast unit-test feedback signalling
            echo ""
            echo "### Test Results"
            echo ""
            if [ "$TEST_PARSE_ERROR" = "true" ]; then
              echo "- Unit: > Could not parse test output."
            elif [ -n "$TEST_PASSED" ]; then
              PASSED=$(echo "${TEST_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              FAILED=$(echo "${TEST_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              if [ "$FAILED" = "0" ]; then
                echo "- Unit: **${PASSED} passed**"
              else
                echo "- Unit: **${PASSED} passed, ${FAILED} FAILED**"
              fi
            else
              echo "- Unit: > did not run"
            fi

            if [ "$UI_TEST_PARSE_ERROR" = "true" ]; then
              echo "- UI: > Could not parse test output."
            elif [ -n "$UI_TEST_PASSED" ]; then
              UI_PASSED=$(echo "${UI_TEST_PASSED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              UI_FAILED=$(echo "${UI_TEST_FAILED:-0}" | grep -oE '^[0-9]+$' || echo "0")
              if [ "$UI_FAILED" = "0" ]; then
                echo "- UI: **${UI_PASSED} passed**"
              else
                echo "- UI: **${UI_PASSED} passed, ${UI_FAILED} FAILED**"
              fi
            else
              echo "- UI: > did not run"
            fi

            # Coverage
            echo ""
            echo "### Coverage"
            echo ""
            if [ "$COVERAGE_PCT" = "0.00" ] || [ -z "$COVERAGE_PCT" ]; then
              echo "> Coverage measurement failed. See [CI logs](${CI_RUN_URL}) for details."
            else
              echo "**${COVERAGE_PCT}%** line coverage"
            fi

            echo ""
            echo "---"
            echo "[View full CI run](${CI_RUN_URL})"
          } > /tmp/pr-comment.md

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        # Fork PRs have read-only GITHUB_TOKEN; comment posting will fail gracefully.
        continue-on-error: true
        with:
          header: ci-report
          path: /tmp/pr-comment.md
