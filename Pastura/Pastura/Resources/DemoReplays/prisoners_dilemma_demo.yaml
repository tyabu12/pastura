turns:
  - round: 1
    phase_index: 0
    phase_type: speak_all
    agent: アキラ
    fields:
      declaration: 'データ上、協力の期待値が高い。まずは全員で協力しませんか。'
      inner_thought: '初回は信頼を築いて後半で判断する。'
  - round: 1
    phase_index: 0
    phase_type: speak_all
    agent: ミサキ
    fields:
      declaration: 'みんなで協力すればきっとうまくいく！私は協力で行きます。'
      inner_thought: 'みんなが協力してくれると嬉しい。'
  - round: 1
    phase_index: 0
    phase_type: speak_all
    agent: リュウジ
    fields:
      declaration: '俺は空気なんて読まないぜ。チャンスがあれば狙うからな。'
      inner_thought: 'ブラフで相手を揺さぶる。でも報復はくらいたくない。'
  - round: 1
    phase_index: 0
    phase_type: speak_all
    agent: ハルカ
    fields:
      declaration: 'ここは手を組みませんか？協調の方が長期的に得だと思います。'
      inner_thought: '同盟を持ちかけて安定した得点源を作る。'
  - round: 1
    phase_index: 0
    phase_type: speak_all
    agent: ケンタ
    fields:
      declaration: 'さーて、今回はどうしよっかなー？気分次第だね。'
      inner_thought: '予測不能に見せて場を引っかき回す。'
  - round: 1
    phase_index: 1
    phase_type: choose
    agent: アキラ
    fields:
      action: cooperate
      inner_thought: '初回は協力。ミサキなら裏切らないはず。'
  - round: 1
    phase_index: 1
    phase_type: choose
    agent: ミサキ
    fields:
      action: cooperate
      inner_thought: 'アキラさんを信じて協力する。'
  - round: 1
    phase_index: 1
    phase_type: choose
    agent: リュウジ
    fields:
      action: betray
      inner_thought: 'ハルカの同盟提案は罠くさい。先に裏切っておこう。'
  - round: 1
    phase_index: 1
    phase_type: choose
    agent: ハルカ
    fields:
      action: cooperate
      inner_thought: '同盟の流れを崩したくない。協力で信頼を示す。'

