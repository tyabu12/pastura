id: detective_scene_v1
name: 探偵の推理会議
description: >
  屋敷で発生した殺人事件。4人の容疑者＋1人の探偵がアリバイと動機を語り合い、
  最後に探偵が犯人を指名する短編推理ロールプレイ。
agents: 5
rounds: 1

context: >
  舞台は1920年代の西洋の屋敷。富豪ハミルトン氏が書斎で毒殺された。
  現場に居合わせた4人の容疑者と、招かれた私立探偵が円卓を囲んでいる。
  それぞれアリバイと動機を明かし、探偵が最後に犯人を推理する。

personas:
  - name: 執事ウォレス
    description: >
      【立場】主人に30年仕える忠実な執事。
      【目的】無実を主張するが、実は主人が自分を解雇しようとしていたことを隠している。
      口調は慇懃で慎重。
  - name: 姪エレノア
    description: >
      【立場】主人の唯一の相続人候補。
      【目的】遺産への関心を隠しつつ、無実をアピールする。動揺すると饒舌になる。
  - name: 庭師トマス
    description: >
      【立場】屋敷の庭を手入れして数年。普段は物静か。
      【目的】事件当夜は温室にいたと主張するが、誰にも見られていない。
      口調は朴訥で最小限。
  - name: 医師カーター
    description: >
      【立場】主人のかかりつけ医。毒物の知識を持つ。
      【目的】職業的知見で状況を説明しつつ、自身の処方箋が凶器になり得たことを伏せる。
      口調は冷静で論理的。
  - name: 探偵ホームズ
    description: >
      【立場】名高い私立探偵。
      【目的】各人の証言の矛盾を突き、真犯人を特定する。
      口調は鋭く、時に皮肉を交える。

phases:
  - type: speak_each
    prompt: >
      他の参加者の発言: {conversation_log}
      あなたの立場から、事件当夜のアリバイまたは観察したことを1〜2文で述べてください。
    output:
      statement: string
      inner_thought: string

  - type: vote
    prompt: >
      これまでの発言ログ:
      {conversation_log}

      誰が犯人だと思いますか？ 最も疑わしい人物を選んでください。
      投票先は必ず以下の名前のいずれかを正確に書いてください: {candidates}
    exclude_self: false
    output:
      vote: string
      reason: string

  - type: score_calc
    logic: vote_tally

  - type: conditional
    if: "max_score >= 3"
    then:
      - type: summarize
        template: >
          🔎 決定的証拠！ 5人中3票以上が {vote_winner} を指名しました（{vote_results}）。
          多数の同意により、{vote_winner} が犯人として断定されました。
    else:
      - type: speak_each
        prompt: >
          投票は割れました: {vote_results}
          疑惑を受けた人は反論を、他の人は追加の観察点を1〜2文で述べてください。
        output:
          statement: string
          inner_thought: string
      - type: summarize
        template: >
          ⚖️ 決定打に欠ける… 最初の投票は割れ（{vote_results}）、
          反論を経ても暫定的な最多疑惑は {vote_winner} です。
          真相は闇の中…
